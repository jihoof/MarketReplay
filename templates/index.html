<!DOCTYPE html>
<html>
<head>
    <title>Stock Chart</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>

<body style="background:#0d1117; color:white;">

    <h2>Stock Chart</h2>

    <!-- 🔥 버튼 -->
    <button onclick="loadChart('day')">Day</button>
    <button onclick="loadChart('week')">Week</button>
    <button onclick="loadChart('month')">Month</button>

    <div id="chart"></div>

    <script>
        async function loadChart(interval) {
            const res = await fetch(`/data?interval=${interval}`);
            const data = await res.json();

            const dates = data.map(d => new Date(d.date));

            // 🔥 캔들 차트
            const candle = {
                x: dates,
                open: data.map(d => d.open),
                high: data.map(d => d.high),
                low: data.map(d => d.low),
                close: data.map(d => d.close),
                type: 'candlestick',
                name: 'Price'
            };

            // 🔥 거래량
            const volume = {
                x: dates,
                y: data.map(d => d.volume || 0),
                type: 'bar',
                name: 'Volume',
                yaxis: 'y2'
            };

            const layout = {
                template: 'plotly_dark',
                title: 'Stock Chart',
                xaxis: { rangeslider: { visible: false } },

                yaxis: { title: 'Price' },

                yaxis2: {
                    title: 'Volume',
                    overlaying: 'y',
                    side: 'right',
                    showgrid: false
                }
            };

            Plotly.newPlot('chart', [candle, volume], layout);
        }

        // 최초 실행
        loadChart('day');
    </script>

</body>
</html>
